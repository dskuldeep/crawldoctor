# Fly.io configuration for CrawlDoctor - Single Machine
app = "crawldoctor"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 10

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "8gb"
  cpu_kind = "shared"
  cpus = 4

[env]
  CRAWLDOCTOR_ENVIRONMENT = "production"
  CRAWLDOCTOR_DEBUG = "false"
  CRAWLDOCTOR_API_HOST = "0.0.0.0"
  CRAWLDOCTOR_API_PORT = "8000"
  CRAWLDOCTOR_CORS_ORIGINS = '["https://crawldoctor.fly.dev","https://getmaxim.ai","https://www.getmaxim.ai","https://app.getmaxim.ai","https://site.getbifrost.ai"]'
  CRAWLDOCTOR_ENABLE_METRICS = "true"
  CRAWLDOCTOR_ADMIN_USERNAME = "admin"
  CRAWLDOCTOR_ADMIN_EMAIL = "admin@crawldoctor.fly.dev"
  # Increased pool to handle CSV exports holding connections
  CRAWLDOCTOR_DATABASE_POOL_SIZE = "50"
  CRAWLDOCTOR_DATABASE_MAX_OVERFLOW = "50"
  # Increased timeout to handle long-running exports
  CRAWLDOCTOR_DATABASE_POOL_TIMEOUT = "120"

[deploy]
  strategy = "immediate"
