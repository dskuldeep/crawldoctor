<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form in iframe – CrawlDoctor test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1rem; }
    h2 { font-size: 1.1rem; margin-top: 0; }
    form { max-width: 360px; }
    label { display: block; margin-top: 0.5rem; font-weight: 500; }
    input, textarea { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .badge { display: inline-block; background: #dbeafe; color: #1e40af; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; margin-left: 0.5rem; }
  </style>
  <!-- Tracker runs inside iframe so it can see this form and report page_url = this document -->
  <script src="/track/js?tid=iframe-test" async></script>
</head>
<body>
  <h2>Demo form <span class="badge">inside iframe</span></h2>
  <p>Fill and submit; CrawlDoctor should receive page_view, form_input, and form_submit from this URL.</p>
  <form id="demo-form" action="#" method="post">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your name">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="3" placeholder="Optional message"></textarea>
    <button type="submit">Submit</button>
  </form>
  <script>
    document.getElementById('demo-form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Form submitted (prevented). Check CrawlDoctor for form_submit event from this iframe.');
    });
  </script>
</body>
</html>
